<!DOCTYPE html>

<head>

    <style>
        /*CSS, este si es un lenguaje de programación, Diseñar en cascada*/
        html, body{
            height: 100%;
            margin: 0;
            font-family: arial, sans-serif;
        }
        body{
            display: flex;
            flex-direction: column;
            text-align: center;
        }
        header{
            padding: 20px;
            background-color:rgba(77, 151, 215, 0.847);
        }
        main {
            width: 100%; /* Asegura que el contenedor principal ocupe todo el ancho */
            padding: 20px;
            box-sizing: border-box; /* Asegura que el padding no afecte el tamaño */
        }
        footer{
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 50px;
            border-top: 10px solid rgb(142, 35, 35);
            background-color: rgb(129, 103, 103);
        }
        h1 {
            color: rgb(255, 255, 255);
            text-shadow: 0 0 5px #a020f0, 0 0 10px #a020f0, 0 0 20px #a020f0, 0 0 40px #9400d3, 0 0 80px #9400d3;
        }
        .logo {
            transition: transform 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.2);
            filter: brightness(1.2);
        }
        .semana {
            width: 60%;    
            max-width: 100%;
            background-color: white;
            margin: 20px auto;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .semana:hover {
            transform: translateY(-5px); 
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }
        @media(max-width:600px){
            footer{
                flex-direction: column;
                gap: 15px;
                padding: 20px;
            }
        }
        iframe {
            border: none;
            display: block;
            margin-top: 20px;
            border: 2px solid var(--borde-color);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px black;
        }
        
        /* Ajuste visual para el video */
        video {
            display: block;
            margin-top: 20px;
            border-radius: 9px;
            box-shadow: 0 4px 15px black;
            outline: none;
        }
    </style>
</head>
